<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; font-size: 16px; margin: 0; }
        .tab-content { display: none; min-height: 80vh; }
        .tab-content.active { display: block; }
        
        #tab-home {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('hero.jpeg');
            background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .scorecard-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e2e8f0; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e2e8f0; min-width: 65px; height: 65px; text-align: center; vertical-align: middle; }
        
        .header-row { background: #1e293b; color: white; font-size: 14px; font-weight: 900; }
        .small-row { height: 35px !important; font-size: 11px; background: #f8fafc; color: #64748b; font-weight: bold; }
        .par-row { height: 45px !important; background: #f1f5f9; font-weight: 900; font-size: 15px; }
        
        /* Grey Subtotal Columns */
        .subtotal-col { background: #f8fafc; font-weight: bold; min-width: 75px; font-size: 12px; color: #64748b; }
        .total-final-col { background: #f1f5f9; font-weight: 800; min-width: 80px; font-size: 18px; color: #1e293b; }
        
        .match-row { background: #ffffff; font-weight: 900; font-size: 18px; border-top: 2px solid #e2e8f0; }
        .text-red-lead { color: #ef4444 !important; }
        .text-blue-lead { color: #3b82f6 !important; }
        .text-as { color: #94a3b8 !important; font-size: 14px; }

        input { background: transparent; outline: none; width: 100%; height: 100%; text-align: center; font-weight: inherit; font-size: 20px; }
        .name-input { text-align: left; padding-left: 12px; font-weight: 800; font-size: 18px; }
        
        .nav-btn { font-size: 15px; letter-spacing: 0.025em; font-weight: 900; padding: 14px 12px; white-space: nowrap; border-bottom: 4px solid transparent; opacity: 0.6; color: white; }
        .active-nav { border-bottom-color: #34d399 !important; opacity: 1 !important; }

        .team-dot { width: 44px; height: 44px; border-radius: 12px; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; }
        
        .bg-red { background-color: #ef4444 !important; color: white; }
        .bg-blue { background-color: #3b82f6 !important; color: white; }
        .bg-white { background-color: #ffffff !important; color: #94a3b8; }
        .bg-grey { background-color: #64748b !important; color: white; }
        .bg-none { background-color: rgba(255,255,255,0.1) !important; color: white; }
        
        .team-border-red { border-left: 14px solid #ef4444 !important; }
        .team-border-blue { border-left: 14px solid #3b82f6 !important; }
        .team-border-white { border-left: 14px solid #e2e8f0 !important; }
        .team-border-grey { border-left: 14px solid #64748b !important; }
    </style>
</head>
<body class="pb-20">

    <header id="main-header" class="relative w-full h-48 overflow-hidden bg-emerald-900 shadow-xl" style="display:none;">
        <img src="hero.jpeg" class="w-full h-full object-cover opacity-80" onerror="this.style.display='none'">
        <div class="absolute inset-0 flex items-end justify-center pb-8 text-center">
            <h1 id="header-title" class="text-white text-4xl font-black italic tracking-tighter uppercase px-6">Live Leaderboard</h1>
        </div>
    </header>

    <nav class="bg-emerald-900 text-white sticky top-0 z-50 shadow-xl overflow-x-auto no-scrollbar">
        <div class="flex px-2" id="nav-bar"></div>
    </nav>

    <div class="relative">
        <!-- HOME TAB -->
        <div id="tab-home" class="tab-content active p-4 space-y-6">
            <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20 shadow-2xl mt-8">
                <h2 class="text-[10px] font-black uppercase text-white/50 mb-6 tracking-widest text-center border-b border-white/10 pb-2">Tournament Roster</h2>
                <div id="roster-setup" class="space-y-5"></div>
                <button onclick="addPlayer()" class="w-full mt-6 py-4 bg-white/5 text-white/70 font-black rounded-xl uppercase text-[10px] tracking-widest border border-white/10">+ Add Player</button>
            </div>
            <button onclick="addRound()" class="w-full py-6 bg-emerald-500 text-white font-black rounded-3xl uppercase tracking-widest shadow-2xl text-lg">Start Next Round</button>
            <button onclick="resetData()" class="block mx-auto text-[10px] text-white/30 font-bold uppercase underline">Reset Everything</button>
        </div>

        <!-- STANDINGS TAB -->
        <div id="tab-summary" class="tab-content pt-4 p-3">
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-900 text-white text-[11px] uppercase italic font-black">
                            <th class="p-6 text-left sticky-col border-none">Player</th>
                            <th class="bg-emerald-700">Earnings</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </div>

        <div id="rounds-container"></div>
    </div>

    <script>
        const holeIndices = [15, 1, 3, 13, 9, 7, 17, 11, 5, 12, 14, 4, 8, 2, 10, 16, 18, 6];
        const pars = [4,4,5,3,4,5,3,4,4, 4,3,4,5,4,4,3,4,5];
        const yards = [342, 422, 541, 165, 371, 519, 125, 386, 404, 394, 157, 372, 500, 456, 410, 196, 330, 552];

        let state = JSON.parse(localStorage.getItem('golfTripV8')) || {
            players: [{ name: '', hdcp: 0, team: 'none' }],
            rounds: []
        };

        function save() { localStorage.setItem('golfTripV8', JSON.stringify(state)); }

        function init() {
            renderNav();
            renderRosterSetup();
            renderStandings();
            renderAllRounds();
            showTab('home');
        }

        function renderNav() {
            let html = `<button id="nav-home" onclick="showTab('home')" class="nav-btn">HOME</button>`;
            html += `<button id="nav-summary" onclick="showTab('summary')" class="nav-btn">STANDINGS</button>`;
            state.rounds.forEach(r => {
                html += `<button id="nav-r${r.id}" onclick="showTab('r${r.id}')" class="nav-btn">ROUND ${r.id}</button>`;
            });
            document.getElementById('nav-bar').innerHTML = html;
        }

        function renderRosterSetup() {
            document.getElementById('roster-setup').innerHTML = state.players.map((p, i) => `
                <div class="flex items-center space-x-4">
                    <div onclick="cycleTeam(${i})" class="team-dot bg-${p.team}">${p.team === 'none' ? '?' : ''}</div>
                    <input type="text" class="text-left font-black w-full text-xl text-white placeholder-white/20" placeholder="Name" value="${p.name}" oninput="state.players[${i}].name=this.value;save();">
                    <div class="flex flex-col items-center">
                        <span class="text-[8px] text-white/40 font-black uppercase tracking-tighter">HCP</span>
                        <input type="number" class="w-16 bg-white/10 border border-white/10 rounded-xl p-2 text-center font-bold text-white text-lg" value="${p.hdcp}" oninput="state.players[${i}].hdcp=parseInt(this.value)||0;save();">
                    </div>
                </div>
            `).join('');
        }

        function cycleTeam(idx) {
            const colors = ['none', 'red', 'blue', 'white', 'grey'];
            let curr = colors.indexOf(state.players[idx].team);
            state.players[idx].team = colors[(curr + 1) % colors.length];
            save(); renderRosterSetup(); renderStandings(); renderAllRounds();
        }

        function addPlayer() { state.players.push({name:'', hdcp:0, team:'none'}); save(); renderRosterSetup(); }

        function addRound() {
            const id = state.rounds.length + 1;
            state.rounds.push({ id, game: 'nassau', bets: [0, 0, 0], scores: {}, wolves: {} });
            save(); init(); showTab('r' + id);
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const target = document.getElementById('tab-' + tabId);
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-nav'));
            const nav = document.getElementById('nav-' + tabId);
            if(nav) nav.classList.add('active-nav');
            const header = document.getElementById('main-header');
            const title = document.getElementById('header-title');
            if (tabId === 'home') header.style.display = 'none';
            else { header.style.display = 'block'; title.innerText = (tabId === 'summary') ? "Live Leaderboard" : ("Round " + tabId.replace('r','')); }
        }

        function renderAllRounds() {
            const container = document.getElementById('rounds-container');
            container.innerHTML = state.rounds.map(r => `
                <div id="tab-r${r.id}" class="tab-content pt-4 space-y-4 p-3">
                    <div class="bg-white p-5 rounded-3xl shadow border border-slate-200 grid grid-cols-2 gap-4 text-center">
                        <div>
                            <label class="text-[9px] uppercase font-black text-slate-400">Game Type</label>
                            <select onchange="updateRoundGame(${r.id}, this.value)" class="w-full p-2 bg-slate-50 border rounded-xl font-bold text-sm">
                                <option value="nassau" ${r.game==='nassau'?'selected':''}>Nassau</option>
                                <option value="stroke" ${r.game==='stroke'?'selected':''}>Stroke Play</option>
                                <option value="ninepoint" ${r.game==='ninepoint'?'selected':''}>9-Point</option>
                                <option value="wolf" ${r.game==='wolf'?'selected':''}>Wolf</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-1">
                            ${r.game==='nassau' ? `
                                <div><span class="text-[8px] font-bold">F$</span><input type="number" class="w-full p-1 border rounded text-xs" value="${r.bets[0]}" oninput="updateRoundBet(${r.id},0,this.value)"></div>
                                <div><span class="text-[8px] font-bold">B$</span><input type="number" class="w-full p-1 border rounded text-xs" value="${r.bets[1]}" oninput="updateRoundBet(${r.id},1,this.value)"></div>
                                <div><span class="text-[8px] font-bold">T$</span><input type="number" class="w-full p-1 border rounded text-xs" value="${r.bets[2]}" oninput="updateRoundBet(${r.id},2,this.value)"></div>
                            ` : `<div class="col-span-3"><span class="text-[8px] font-bold">Bet Per Pt</span><input type="number" class="w-full p-2 border rounded font-bold" value="${r.bets[0]}" oninput="updateRoundBet(${r.id},0,this.value)"></div>`}
                        </div>
                    </div>
                    <div id="scorecard-${r.id}"></div>
                </div>
            `).join('');
            state.rounds.forEach(r => renderScorecard(r.id));
        }

        function renderScorecard(rId) {
            const r = state.rounds.find(x => x.id === rId);
            const container = document.getElementById('scorecard-' + rId);
            if(!container) return;

            let html = `<div class="scorecard-wrapper shadow-2xl rounded-3xl border border-slate-200 bg-white"><table>`;
            html += `<thead><tr class="header-row"><th class="sticky-col min-w-[130px]">HOLE</th>`;
            for(let h=1; h<=18; h++) { html += `<th>${h}</th>`; if(h===9) html += `<th class="subtotal-col">OUT</th>`; }
            html += `<th class="subtotal-col">IN</th><th class="total-final-col bg-emerald-700 text-white">TOT</th></tr></thead><tbody>`;

            const small = (label, data, sub) => {
                let row = `<tr class="small-row"><td class="sticky-col text-left px-3 uppercase">${label}</td>`;
                for(let h=1; h<=18; h++) { row += `<td>${data[h-1]}</td>`; if(h===9) row += `<td class="subtotal-col">${sub[0]}</td>`; }
                row += `<td class="subtotal-col">${sub[1]}</td><td class="total-final-col font-bold text-xs">${sub[2]}</td></tr>`; return row;
            }
            html += small('Yards', yards, [3275, 3367, 6642]);
            html += small('HCP Index', holeIndices, ['', '', '']);
            html += small('Par', pars, [36, 36, 72]);

            state.players.forEach((p, pIdx) => {
                let out = 0, in9 = 0;
                html += `<tr><td class="sticky-col text-left px-3 font-black text-slate-700 team-border-${p.team}">${p.name || '...'}</td>`;
                for(let h=1; h<=18; h++) {
                    const score = r.scores[`h${h}_p${pIdx}`] || '';
                    if(h<=9) out += (score || 0); else in9 += (score || 0);
                    html += `<td class="relative">
                        <input type="number" inputmode="numeric" value="${score}" oninput="state.rounds.find(x=>x.id===${rId}).scores['h${h}_p${pIdx}']=parseInt(this.value)||0;save();updateLiveMatch(${rId});">
                        ${getStrokes(p.hdcp, h) > 0 ? `<span class="absolute top-0 right-1 text-[10px] text-red-500 font-black">${'*'.repeat(getStrokes(p.hdcp,h))}</span>` : ''}
                    </td>`;
                    if(h===9) html += `<td class="subtotal-col">${out || ''}</td>`;
                }
                html += `<td class="subtotal-col">${in9 || ''}</td><td class="total-final-col font-black text-xl">${(out+in9) || ''}</td></tr>`;
            });

            if (r.game === 'nassau') {
                html += `<tr class="match-row" id="row-side-${rId}"><td class="sticky-col text-left px-3 uppercase text-xs font-black">Side</td></tr>`;
                html += `<tr class="match-row border-t-2" id="row-overall-${rId}"><td class="sticky-col text-left px-3 uppercase text-xs font-black">Overall</td></tr>`;
            }
            html += `</tbody></table></div>`;
            container.innerHTML = html;
            if(r.game === 'nassau') updateLiveMatch(rId);
        }

        function updateLiveMatch(rId) {
            const r = state.rounds.find(x => x.id === rId);
            const sideRow = document.getElementById(`row-side-${rId}`);
            const overRow = document.getElementById(`row-overall-${rId}`);
            if(!sideRow || !overRow) return;

            let rFrontWins = 0, bFrontWins = 0, rBackWins = 0, bBackWins = 0;
            let sideHtml = `<td class="sticky-col text-left px-3 uppercase text-xs font-black">Side</td>`;
            let overHtml = `<td class="sticky-col text-left px-3 uppercase text-xs font-black">Overall</td>`;

            for(let h=1; h<=18; h++) {
                const getNet = (c) => {
                    let s = state.players.map((p,i)=>(p.team===c && r.scores[`h${h}_p${i}`])?r.scores[`h${h}_p${i}`]-getStrokes(p.hdcp,h):999);
                    return Math.min(...s);
                };
                let red = getNet('red'), blue = getNet('blue');
                
                if(red < 900 && blue < 900) {
                    if (red < blue) { if(h<=9) rFrontWins++; else rBackWins++; }
                    else if (blue < red) { if(h<=9) bFrontWins++; else bBackWins++; }
                }

                const getMatchStatus = (rW, bW) => {
                    if (rW === bW) return {v:'AS',c:'text-as'};
                    return rW > bW ? {v: (rW-bW) + ' ↑', c:'text-red-lead'} : {v: (bW-rW) + ' ↑', c:'text-blue-lead'};
                };

                const s = h<=9 ? getMatchStatus(rFrontWins, bFrontWins) : getMatchStatus(rBackWins, bBackWins);
                const o = getMatchStatus(rFrontWins + rBackWins, bFrontWins + bBackWins);

                sideHtml += `<td class="${s.c}">${s.v}</td>`;
                overHtml += `<td class="${o.c}">${o.v}</td>`;
                if(h===9) { sideHtml += `<td class="subtotal-col"></td>`; overHtml += `<td class="subtotal-col"></td>`; }
            }
            sideRow.innerHTML = sideHtml + `<td></td><td></td>`;
            overRow.innerHTML = overHtml + `<td></td><td></td>`;
        }

        function renderStandings() {
            let cash = Array(state.players.length).fill(0);
            state.rounds.forEach(r => {
                if(r.game === 'nassau') {
                    let rF=0, bF=0, rB=0, bB=0;
                    for(let h=1; h<=18; h++) {
                        const getNet = (c) => Math.min(...state.players.map((p,i)=>(p.team===c&&r.scores[`h${h}_p${i}`])?r.scores[`h${h}_p${i}`]-getStrokes(p.hdcp,h):999));
                        let nr=getNet('red'), nb=getNet('blue');
                        if(nr<900 && nb<900) {
                            if (nr < nb) { if(h<=9) rF++; else rB++; }
                            else if (nb < nr) { if(h<=9) bF++; else bB++; }
                        }
                    }
                    let rw=0; 
                    if(rF > bF) rw += r.bets[0]; else if(bF > rF) rw -= r.bets[0];
                    if(rB > bB) rw += r.bets[1]; else if(bB > rB) rw -= r.bets[1];
                    if((rF + rB) > (bF + bB)) rw += r.bets[2]; else if((bF + bB) > (rF + rB)) rw -= r.bets[2];
                    state.players.forEach((p,i)=>{ if(p.team==='red') cash[i]+=rw; if(p.team==='blue') cash[i]-=rw; });
                }
            });
            document.getElementById('standings-body').innerHTML = state.players.map((p,i)=>`
                <tr class="border-b"><td class="p-8 text-left font-black text-slate-700 text-xl team-border-${p.team}">${p.name||`Player ${i+1}`}</td>
                <td class="font-black text-3xl ${cash[i]>=0?'text-emerald-600':'text-red-500'}">${cash[i]!==0?(cash[i]>0?'+$'+cash[i]:'-$'+Math.abs(cash[i])):'-'}</td></tr>
            `).join('');
        }

        function updateRoundGame(id, val) { state.rounds.find(x=>x.id===id).game=val; save(); renderAllRounds(); showTab('r'+id); }
        function updateRoundBet(id, idx, val) { state.rounds.find(x=>x.id===id).bets[idx]=parseInt(val)||0; save(); renderStandings(); }
        function getStrokes(hdcp, hIdx) { let s=0; let t=hdcp; while(t>0){if(t>=holeIndices[hIdx-1])s++; t-=18;} return s; }
        function resetData() { if(confirm("Wipe Trip?")) { localStorage.removeItem('golfTripV8'); location.reload(); } }

        init();
    </script>
</body>
</html>
