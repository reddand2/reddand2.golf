<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dacotah Ridge Betting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .cream-bg { background-color: #fdfbf7; }
    </style>
</head>
<body class="pb-20 text-slate-900">

    <!-- HERO SECTION (Summary Page Only) -->
    <div id="hero-header" class="relative w-full h-56 overflow-hidden bg-black">
        <img src="hero.jpg" class="w-full h-full object-cover opacity-70" alt="Dacotah Ridge">
        <div class="absolute inset-0 hero-gradient flex items-center justify-center">
            <h1 class="text-white text-4xl font-black italic tracking-tighter uppercase text-center border-y-2 border-white/30 py-2 px-6">
                Live Leaderboard
            </h1>
        </div>
    </div>

    <!-- STICKY NAV -->
    <nav class="bg-emerald-900 text-white sticky top-0 z-50 shadow-xl">
        <div class="flex justify-around p-3 text-xs font-bold uppercase tracking-widest">
            <button onclick="showTab('summary')" class="nav-btn px-4 py-2 border-b-2 border-emerald-400">Home</button>
            <button onclick="showTab('r1')" class="nav-btn px-4 py-2 border-b-2 border-transparent opacity-60">R1</button>
            <button onclick="showTab('r2')" class="nav-btn px-4 py-2 border-b-2 border-transparent opacity-60">R2</button>
            <button onclick="showTab('r3')" class="nav-btn px-4 py-2 border-b-2 border-transparent opacity-60">R3</button>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4 cream-bg min-h-screen">
        
        <!-- SUMMARY TAB -->
        <div id="summary" class="tab-content active space-y-6">
            
            <!-- TRIP TOTALS (The Betting Dashboard) -->
            <div class="space-y-3">
                <h2 class="text-xs font-black text-emerald-800 uppercase tracking-widest flex items-center">
                    <span class="bg-emerald-800 text-white px-2 py-0.5 rounded mr-2">Trip Profit</span> Standing
                </h2>
                <div id="overall-standings" class="space-y-3">
                    <!-- Money totals here -->
                </div>
            </div>

            <!-- PLAYER SETUP -->
            <div class="bg-white p-5 rounded-2xl shadow-md border border-slate-200">
                <h2 class="font-black text-slate-800 uppercase text-xs mb-4 flex justify-between">
                    Player Roster <span>HDCP</span>
                </h2>
                <div class="space-y-3" id="setup-inputs">
                    <!-- Setup inputs generated by JS -->
                </div>
            </div>

            <div id="team-assignments" class="text-center italic text-slate-500 text-sm py-4 border-t border-slate-200"></div>
            
            <button onclick="resetData()" class="w-full text-[10px] text-slate-400 uppercase tracking-widest mt-10">Clear All Trip Data</button>
        </div>

        <!-- ROUND TABS -->
        <div id="r1" class="tab-content"></div>
        <div id="r2" class="tab-content"></div>
        <div id="r3" class="tab-content"></div>
    </div>

    <script>
        const holeIndices = [15, 1, 3, 13, 9, 7, 17, 11, 5, 12, 14, 4, 8, 2, 10, 16, 18, 6];
        
        let state = JSON.parse(localStorage.getItem('golfTripData')) || {
            players: [
                { name: 'Player 1', hdcp: 10 },
                { name: 'Player 2', hdcp: 12 },
                { name: 'Player 3', hdcp: 15 },
                { name: 'Player 4', hdcp: 20 }
            ],
            rounds: { r1: {}, r2: {}, r3: {} }
        };

        function save() {
            localStorage.setItem('golfTripData', JSON.stringify(state));
            renderSummary();
        }

        function resetData() {
            if(confirm("Wipe all scores and money?")) {
                localStorage.removeItem('golfTripData');
                location.reload();
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            // UI Visuals for Tab bar
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.add('opacity-60', 'border-transparent');
                btn.classList.remove('border-emerald-400');
            });
            event.currentTarget.classList.remove('opacity-60', 'border-transparent');
            event.currentTarget.classList.add('border-emerald-400');

            // Hide hero on round tabs to save space
            document.getElementById('hero-header').style.display = (tabId === 'summary') ? 'block' : 'none';

            window.scrollTo(0,0);
            if(tabId !== 'summary') renderRound(tabId);
        }

        function getStrokesForHole(hdcp, holeIdx) {
            let strokes = 0;
            let tempHdcp = hdcp;
            while (tempHdcp > 0) {
                if (tempHdcp >= holeIndices[holeIdx-1]) strokes++;
                tempHdcp -= 18;
            }
            return strokes;
        }

        function getTeams() {
            let sorted = state.players.map((p, i) => ({...p, id: i})).sort((a,b) => a.hdcp - b.hdcp);
            return { teamA: [sorted[0].id, sorted[3].id], teamB: [sorted[1].id, sorted[2].id] };
        }

        function renderSetup() {
            document.getElementById('setup-inputs').innerHTML = state.players.map((p, i) => `
                <div class="flex items-center space-x-2">
                    <input class="flex-grow border-b-2 border-slate-100 p-1 font-bold focus:border-emerald-500 outline-none transition-colors" value="${p.name}" onchange="state.players[${i}].name=this.value; save(); renderTeams();">
                    <input class="w-12 border rounded bg-slate-50 p-1 text-center font-bold" type="number" value="${p.hdcp}" onchange="state.players[${i}].hdcp=parseInt(this.value)||0; save(); renderTeams();">
                </div>
            `).join('');
            renderTeams();
        }

        function renderTeams() {
            const teams = getTeams();
            document.getElementById('team-assignments').innerHTML = `
                Team A: ${state.players[teams.teamA[0]].name} & ${state.players[teams.teamA[1]].name}<br>
                vs<br>
                Team B: ${state.players[teams.teamB[0]].name} & ${state.players[teams.teamB[1]].name}
            `;
        }

        function renderRound(roundId) {
            const container = document.getElementById(roundId);
            let html = `<div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden mb-6">
                <table class="w-full text-center text-xs">
                    <thead>
                        <tr class="bg-emerald-900 text-white">
                            <th class="p-4 text-left">HOLE</th>
                            ${state.players.map(p => `<th class="p-1 font-black uppercase text-[9px]">${p.name.substring(0,4)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>`;
            
            for(let h=1; h<=18; h++) {
                html += `<tr class="${h % 2 === 0 ? 'bg-slate-50' : 'bg-white'} border-b border-slate-100">
                    <td class="p-3 text-left font-black text-slate-400">#${h}</td>
                    ${state.players.map((p, i) => {
                        const strokes = getStrokesForHole(p.hdcp, h);
                        const val = state.rounds[roundId][`h${h}_p${i}`] || '';
                        return `<td class="p-1 relative">
                            <input type="number" class="w-full h-10 text-center text-xl font-bold border rounded focus:ring-2 focus:ring-emerald-500 outline-none" 
                                value="${val}" inputmode="numeric" onchange="state.rounds['${roundId}']['h${h}_p${i}']=parseInt(this.value); save();">
                            ${strokes > 0 ? `<span class="absolute top-0 right-1 text-red-500 font-bold text-xs">${'*'.repeat(strokes)}</span>` : ''}
                        </td>`;
                    }).join('')}
                </tr>`;
            }
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function calculateNassau(roundId) {
            const teams = getTeams();
            let teamA_F = 0, teamB_F = 0, teamA_B = 0, teamB_B = 0;
            
            for(let h=1; h<=18; h++) {
                const getNet = (indices) => {
                    let scores = indices.map(idx => {
                        let gross = state.rounds[roundId][`h${h}_p${idx}`];
                        return gross ? gross - getStrokesForHole(state.players[idx].hdcp, h) : 999;
                    });
                    return Math.min(...scores);
                };
                let bestA = getNet(teams.teamA), bestB = getNet(teams.teamB);
                if (bestA === 999 || bestB === 999) continue;
                if (h <= 9) { teamA_F += bestA; teamB_F += bestB; }
                else { teamA_B += bestA; teamB_B += bestB; }
            }

            let aWin = 0, bWin = 0;
            if (teamA_F < teamB_F) aWin += 10; else if (teamB_F < teamA_F) bWin += 10;
            if (teamA_B < teamB_B) aWin += 10; else if (teamB_B < teamA_B) bWin += 10;
            if ((teamA_F+teamA_B) < (teamB_F+teamB_B)) aWin += 20; else if ((teamB_F+teamB_B) < (teamA_F+teamA_B)) bWin += 20;
            return { a: aWin, b: bWin };
        }

        function renderSummary() {
            const r1 = calculateNassau('r1'), r2 = calculateNassau('r2'), r3 = calculateNassau('r3');
            const netA = (r1.a + r2.a + r3.a) - (r1.b + r2.b + r3.b);
            const teams = getTeams();

            document.getElementById('overall-standings').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] uppercase font-black text-slate-400">Team A (1&4)</p>
                        <p class="font-bold text-slate-800">${state.players[teams.teamA[0]].name} & ${state.players[teams.teamA[1]].name}</p>
                    </div>
                    <div class="text-3xl font-black ${netA >= 0 ? 'text-green-600' : 'text-red-500'}">${netA >= 0 ? '+$'+netA : '-$'+Math.abs(netA)}</div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-orange-500 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] uppercase font-black text-slate-400">Team B (2&3)</p>
                        <p class="font-bold text-slate-800">${state.players[teams.teamB[0]].name} & ${state.players[teams.teamB[1]].name}</p>
                    </div>
                    <div class="text-3xl font-black ${netA <= 0 ? 'text-green-600' : 'text-red-500'}">${netA <= 0 ? '+$'+Math.abs(netA) : '-$'+netA}</div>
                </div>
            `;
        }

        renderSetup();
        renderSummary();
    </script>
</body>
</html>
