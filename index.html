<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Trip Scorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-20 text-slate-800">

    <!-- Header -->
    <header class="bg-emerald-800 text-white p-4 text-center sticky top-0 z-50 shadow-lg">
        <h1 class="text-xl font-bold tracking-tight">GOLF TRIP 2024</h1>
        <div class="flex justify-around mt-3 text-xs font-bold uppercase tracking-widest">
            <button onclick="showTab('summary')" class="px-3 py-1 bg-emerald-900 rounded-full border border-emerald-700">Summary</button>
            <button onclick="showTab('r1')" class="px-3 py-1 bg-emerald-900 rounded-full border border-emerald-700">R1</button>
            <button onclick="showTab('r2')" class="px-3 py-1 bg-emerald-900 rounded-full border border-emerald-700">R2</button>
            <button onclick="showTab('r3')" class="px-3 py-1 bg-emerald-900 rounded-full border border-emerald-700">R3</button>
        </div>
    </header>

    <div class="max-w-md mx-auto p-3">
        
        <!-- SUMMARY / SETUP TAB -->
        <div id="summary" class="tab-content active space-y-4">
            <!-- SETUP SECTION -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-black text-emerald-800 uppercase text-sm mb-3 border-b pb-1">1. Setup Players & HDCP</h2>
                <div class="grid grid-cols-2 gap-3" id="setup-inputs">
                    <!-- Setup inputs generated by JS -->
                </div>
                <button onclick="resetData()" class="mt-4 text-[10px] text-red-400 underline uppercase tracking-tighter">Reset All Trip Data</button>
            </div>

            <!-- TEAMS DISPLAY -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-black text-emerald-800 uppercase text-sm mb-3 border-b pb-1">2. Today's Teams (1&4 vs 2&3)</h2>
                <div id="team-assignments" class="text-sm space-y-2"></div>
            </div>

            <!-- TRIP TOTALS -->
            <div class="bg-emerald-900 p-4 rounded-xl shadow-lg text-white">
                <h2 class="font-black uppercase text-sm mb-3 border-b border-emerald-700 pb-1">3. Trip Money Standings</h2>
                <div id="overall-standings" class="space-y-3">
                    <!-- Money totals here -->
                </div>
            </div>
        </div>

        <!-- ROUND TABS -->
        <div id="r1" class="tab-content"></div>
        <div id="r2" class="tab-content"></div>
        <div id="r3" class="tab-content"></div>
    </div>

    <script>
        // YOUR SPECIFIC HOLE INDICES
        const holeIndices = [15, 1, 3, 13, 9, 7, 17, 11, 5, 12, 14, 4, 8, 2, 10, 16, 18, 6];
        
        // Initial State
        let state = JSON.parse(localStorage.getItem('golfTripData')) || {
            players: [
                { name: 'Player 1', hdcp: 10 },
                { name: 'Player 2', hdcp: 12 },
                { name: 'Player 3', hdcp: 15 },
                { name: 'Player 4', hdcp: 20 }
            ],
            rounds: { r1: {}, r2: {}, r3: {} }
        };

        function save() {
            localStorage.setItem('golfTripData', JSON.stringify(state));
            renderSummary();
        }

        function resetData() {
            if(confirm("Are you sure? This will delete all scores for all 3 rounds.")) {
                localStorage.removeItem('golfTripData');
                location.reload();
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            window.scrollTo(0,0);
            if(tabId !== 'summary') renderRound(tabId);
        }

        function getStrokesForHole(hdcp, holeIdx) {
            let strokes = 0;
            let tempHdcp = hdcp;
            while (tempHdcp > 0) {
                if (tempHdcp >= holeIndices[holeIdx-1]) strokes++;
                tempHdcp -= 18;
            }
            return strokes;
        }

        function getTeams() {
            // Returns the original indices of players sorted by handicap
            let sorted = state.players
                .map((p, i) => ({...p, id: i}))
                .sort((a,b) => a.hdcp - b.hdcp);
            
            return {
                teamA: [sorted[0].id, sorted[3].id], // Best & Worst
                teamB: [sorted[1].id, sorted[2].id], // Middle two
                sortedPlayers: sorted
            };
        }

        function renderSetup() {
            const container = document.getElementById('setup-inputs');
            container.innerHTML = state.players.map((p, i) => `
                <div class="flex flex-col space-y-1">
                    <input class="border rounded p-2 text-sm font-bold bg-slate-50" value="${p.name}" placeholder="Name" onchange="state.players[${i}].name=this.value; save(); renderTeams();">
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] text-slate-400 font-bold">HDCP:</span>
                        <input class="w-full border rounded p-1 text-sm bg-white" type="number" value="${p.hdcp}" onchange="state.players[${i}].hdcp=parseInt(this.value)||0; save(); renderTeams();">
                    </div>
                </div>
            `).join('');
            renderTeams();
        }

        function renderTeams() {
            const teams = getTeams();
            const container = document.getElementById('team-assignments');
            container.innerHTML = `
                <div class="p-2 bg-blue-50 border border-blue-100 rounded">
                    <span class="font-bold text-blue-800">Team A:</span> ${state.players[teams.teamA[0]].name} & ${state.players[teams.teamA[1]].name}
                </div>
                <div class="p-2 bg-orange-50 border border-orange-100 rounded">
                    <span class="font-bold text-orange-800">Team B:</span> ${state.players[teams.teamB[0]].name} & ${state.players[teams.teamB[1]].name}
                </div>
            `;
        }

        function renderRound(roundId) {
            const container = document.getElementById(roundId);
            const teams = getTeams();
            
            let html = `<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-center text-xs">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200">
                            <th class="p-3 text-left">Hole</th>
                            ${state.players.map(p => `<th class="p-1 font-black text-[10px]">${p.name.substring(0,4).toUpperCase()}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>`;
            
            for(let h=1; h<=18; h++) {
                const isBackNine = h === 10;
                html += `<tr class="${isBackNine ? 'border-t-4 border-emerald-100' : 'border-b border-slate-50'}">
                    <td class="p-3 text-left font-bold bg-slate-50">
                        ${h} <span class="text-[9px] text-slate-400 block font-normal text-center">Idx ${holeIndices[h-1]}</span>
                    </td>
                    ${state.players.map((p, i) => {
                        const strokes = getStrokesForHole(p.hdcp, h);
                        const val = state.rounds[roundId][`h${h}_p${i}`] || '';
                        return `<td class="p-1 relative">
                            <input type="number" 
                                class="w-full h-10 text-center text-lg font-medium border rounded shadow-inner focus:ring-2 focus:ring-emerald-500 outline-none" 
                                value="${val}" 
                                inputmode="numeric"
                                onchange="state.rounds['${roundId}']['h${h}_p${i}']=parseInt(this.value); save();">
                            ${strokes > 0 ? `<span class="absolute top-1 right-1 text-red-500 font-bold">${'*'.repeat(strokes)}</span>` : ''}
                        </td>`;
                    }).join('')}
                </tr>`;
            }
            
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function calculateNassau(roundId) {
            const teams = getTeams();
            let teamA_Front = 0, teamB_Front = 0;
            let teamA_Back = 0, teamB_Back = 0;
            
            for(let h=1; h<=18; h++) {
                const getBestNet = (indices) => {
                    let scores = indices.map(idx => {
                        let gross = state.rounds[roundId][`h${h}_p${idx}`];
                        if (!gross) return 999;
                        return gross - getStrokesForHole(state.players[idx].hdcp, h);
                    });
                    return Math.min(...scores);
                };

                let bestA = getBestNet(teams.teamA);
                let bestB = getBestNet(teams.teamB);

                if (bestA === 999 || bestB === 999) continue;

                if (h <= 9) { teamA_Front += bestA; teamB_Front += bestB; }
                else { teamA_Back += bestA; teamB_Back += bestB; }
            }

            let winA = 0, winB = 0;
            if (teamA_Front < teamB_Front) winA += 10; else if (teamB_Front < teamA_Front) winB += 10;
            if (teamA_Back < teamB_Back) winA += 10; else if (teamB_Back < teamA_Back) winB += 10;
            
            const totalA = teamA_Front + teamA_Back;
            const totalB = teamB_Front + teamB_Back;
            if (totalA < totalB) winA += 20; else if (totalB < totalA) winB += 20;

            return { a: winA, b: winB };
        }

        function renderSummary() {
            const r1 = calculateNassau('r1');
            const r2 = calculateNassau('r2');
            const r3 = calculateNassau('r3');
            
            const totalA = r1.a + r2.a + r3.a;
            const totalB = r1.b + r2.b + r3.b;

            const netA = totalA - totalB;
            const netB = totalB - totalA;

            const teams = getTeams();

            document.getElementById('overall-standings').innerHTML = `
                <div class="flex justify-between items-center bg-white/10 p-3 rounded-lg border border-white/5">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-emerald-300">Team A</p>
                        <p class="font-bold">${state.players[teams.teamA[0]].name} & ${state.players[teams.teamA[1]].name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black ${netA >= 0 ? 'text-green-400' : 'text-red-400'}">${netA >= 0 ? '+$'+netA : '-$'+Math.abs(netA)}</p>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-white/10 p-3 rounded-lg border border-white/5">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-emerald-300">Team B</p>
                        <p class="font-bold">${state.players[teams.teamB[0]].name} & ${state.players[teams.teamB[1]].name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black ${netB >= 0 ? 'text-green-400' : 'text-red-400'}">${netB >= 0 ? '+$'+netB : '-$'+Math.abs(netB)}</p>
                    </div>
                </div>
            `;
        }

        // Initialize
        renderSetup();
        renderSummary();
    </script>
</body>
</html>
